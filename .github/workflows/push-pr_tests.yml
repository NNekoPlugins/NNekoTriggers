name: "Push/PR: Tests"

on:
  push:
    branches: [main]
    paths:
      - "NNekoTriggers/**/*.cs"
      - "NNekoTriggers/**/*.csproj"
      - "NNekoTriggers/**/*.resx"
  pull_request:
    branches: [main]
    paths:
      - "NNekoTriggers/**/*.cs"
      - "NNekoTriggers/**/*.csproj"
      - "NNekoTriggers/**/*.resx"
    types: [ready_for_review, opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud reference assemblies
        shell: pwsh
        run: |
          $dest = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest `
            -Uri 'https://goatcorp.github.io/dalamud-distrib/latest.zip' `
            -OutFile dalamud.zip
          Expand-Archive -Force -Path dalamud.zip -DestinationPath $dest

      - name: Build
        run: dotnet build -c Release

      - name: Package
        run: dotnet publish --configuration Release
