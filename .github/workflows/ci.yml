name: "CI: Build & Lint"

on:
  push:
    branches: [ main ]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.resx"
  pull_request:
    branches: [ main ]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.resx"
    types: [ ready_for_review, opened, synchronize, reopened ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_mode: [ Release, Debug ]
        dalamud_branch: [ release, stg ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache Dalamud
        id: dalamud-cache
        uses: actions/cache@v4
        with:
          path: .dalamud-cache/${{ matrix.dalamud_branch }}
          key: dalamud-${{ matrix.dalamud_branch }}

      - name: Setup Dalamud
        if: steps.dalamud-cache.outputs.cache-hit != 'true'
        uses: Blooym/setup-dalamud@v1.1.0
        with:
          branch: ${{ matrix.dalamud_branch }}
          path-environment-variable: DALAMUD_HOME
          distribution-source: https://goatcorp.github.io/dalamud-distrib

      - name: Move Dalamud to cache
        if: steps.dalamud-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .dalamud-cache/${{ matrix.dalamud_branch }}
          cp -r "$DALAMUD_HOME"/* .dalamud-cache/${{ matrix.dalamud_branch }}/

      - name: Use cached Dalamud
        if: steps.dalamud-cache.outputs.cache-hit == 'true'
        run: echo "DALAMUD_HOME=$(pwd)/.dalamud-cache/${{ matrix.dalamud_branch }}" >> $GITHUB_ENV

      - name: Restore Project
        run: dotnet restore

      - name: Check for Lint Errors
        id: lint
        continue-on-error: true
        run: dotnet format --verify-no-changes > lint.txt 2>&1

      - name: Report Lint Errors
        if: steps.lint.outcome == 'failure'
        run: cat lint.txt | sed -E 's/^(.*)$/::warning:: \1/g'

      - name: Build Project
        run: dotnet build -c ${{ matrix.build_mode }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.build_mode }}-${{ matrix.dalamud_branch }}
          path: |
            **/bin/**/${{ matrix.build_mode }}/*.dll
            **/bin/**/${{ matrix.build_mode }}/*.json
            **/bin/**/${{ matrix.build_mode }}/*.pdb
