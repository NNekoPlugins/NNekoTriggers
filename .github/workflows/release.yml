name: "Release: Package & Publish"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release

      - name: Package Plugin
        run: |
          mkdir -p dist
          zip -j dist/${{ github.event.repository.name }}.zip **/bin/**/Release/*.dll **/bin/**/Release/*.json

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-release
          path: dist/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
